<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #09090b;
      font-family: 'Arial', sans-serif;
      display: flex;
      overflow: hidden;
      position: relative;
    }
    
    /* Grid background */
    .grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    
    /* Lime accent glow */
    .glow {
      position: absolute;
      top: 50%;
      right: 10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(204,255,0,0.15) 0%, transparent 70%);
      transform: translateY(-50%);
    }
    
    .content {
      position: relative;
      z-index: 10;
      padding: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      width: 100%;
    }
    
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(204,255,0,0.1);
      border: 1px solid rgba(204,255,0,0.3);
      padding: 8px 16px;
      border-radius: 100px;
      width: fit-content;
      margin-bottom: 32px;
    }
    
    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccff00;
    }
    
    .badge-text {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #ccff00;
    }
    
    h1 {
      font-size: 80px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -2px;
      line-height: 0.85;
      color: white;
      margin-bottom: 8px;
    }
    
    h1.outline {
      color: transparent;
      -webkit-text-stroke: 2px rgba(255,255,255,0.3);
    }
    
    .subtitle {
      font-family: 'Courier New', monospace;
      font-size: 18px;
      color: #666;
      margin-top: 32px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    
    .url {
      position: absolute;
      bottom: 40px;
      right: 80px;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      color: #ccff00;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    
    /* Spider icon */
    .spider {
      position: absolute;
      top: 60px;
      right: 80px;
      width: 80px;
      height: 80px;
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow"></div>
  
  <svg class="spider" viewBox="0 0 64 64" fill="none">
    <circle cx="32" cy="28" r="8" fill="#ccff00"/>
    <ellipse cx="32" cy="40" rx="6" ry="10" fill="#ccff00"/>
    <path d="M26 24 L14 12" stroke="#ccff00" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M24 28 L10 22" stroke="#ccff00" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M38 24 L50 12" stroke="#ccff00" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M40 28 L54 22" stroke="#ccff00" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M26 36 L14 44" stroke="#ccff00" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M26 42 L10 50" stroke="#ccff00" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M38 36 L50 44" stroke="#ccff00" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M38 42 L54 50" stroke="#ccff00" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
  
  <div class="content">
    <div class="badge">
      <div class="badge-dot"></div>
      <span class="badge-text">Open for Freelance</span>
    </div>
    
    <h1>KUMAR</h1>
    <h1 class="outline">SATYAM</h1>
    
    <div class="subtitle">Systems Architect & Breakthrough Engineer</div>
  </div>
  
  <div class="url">spidexlab.me</div>
</body>
</html>
